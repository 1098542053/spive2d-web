services:
  spive2d-web:
    image: ghcr.io/1098542053/spive2d-web:latest
    container_name: spive2d-web
    restart: unless-stopped
    ports:
      - "8080:3000"
    volumes:
      # 模型目录：在 Docker UI 中将你的模型文件夹挂载到 /data/models
      # 用户数据：注册信息等持久化存储
      - spive2d-data:/data
    environment:
      - MODELS_ROOT=/data/models
      - DATA_DIR=/data
      - PORT=3000
      - TZ=Asia/Shanghai

volumes:
  spive2d-data:
